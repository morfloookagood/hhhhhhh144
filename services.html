<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Услуги | Aroma Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a1a; line-height: 1.5; overflow-x: hidden; }
        :root {
            --accent-dark: #a57c52;
            --text-dark: #1f1f1f;
            --text-muted: #5a5a5a;
            --border-light: #eaeaea;
            --bg-light: #f9f9f9;
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.05);
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
        .btn { display: inline-block; background: var(--text-dark); color: white; padding: 12px 28px; border-radius: 40px; text-decoration: none; font-weight: 500; transition: all 0.2s; border: none; cursor: pointer; font-family: inherit; }
        .btn:hover { background: var(--accent-dark); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--text-dark); color: var(--text-dark); }
        .btn-outline:hover { background: var(--text-dark); color: white; }
        
        header { padding: 24px 0; position: sticky; top: 0; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); z-index: 100; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.6rem; font-weight: 600; text-decoration: none; color: var(--text-dark); }
        .logo span { color: var(--accent-dark); }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-dark); }
        
        .page-title { padding: 60px 0 40px; background: var(--bg-light); }
        h1 { font-size: 3rem; font-weight: 500; }
        .section-subtitle { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-dark); margin-bottom: 1rem; }
        
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 60px 0; }
        .service-card { background: white; padding: 40px 32px; border-radius: 32px; border: 1px solid var(--border-light); transition: all 0.25s; text-align: center; cursor: pointer; }
        .service-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-md); }
        .service-icon { font-size: 2.8rem; color: var(--accent-dark); margin-bottom: 24px; }
        .service-card h3 { font-size: 1.6rem; margin-bottom: 16px; }
        .service-card p { color: var(--text-muted); line-height: 1.6; }
        
        /* Модальное окно на весь экран */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-container {
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            background: white;
            border-radius: 40px;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 32px 32px 16px 32px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .modal-header h2 {
            font-size: 1.8rem;
            margin: 0;
        }
        
        .modal-close {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-light);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: var(--accent-dark);
            color: white;
            transform: rotate(90deg);
        }
        
        .modal-content {
            padding: 32px;
        }
        
        .modal-icon {
            font-size: 3.5rem;
            color: var(--accent-dark);
            margin-bottom: 24px;
        }
        
        .modal-description {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 24px;
        }
        
        .modal-features {
            background: var(--bg-light);
            padding: 24px;
            border-radius: 24px;
            margin: 24px 0;
        }
        
        .modal-features h4 {
            margin-bottom: 16px;
            font-size: 1.2rem;
        }
        
        .modal-features ul {
            list-style: none;
        }
        
        .modal-features li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-features i {
            color: var(--accent-dark);
            width: 24px;
        }
        
        .modal-price {
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent-dark);
            margin: 24px 0;
        }
        
        .modal-actions {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        
        footer { background: #faf8f5; padding: 48px 0 32px; border-top: 1px solid var(--border-light); margin-top: 40px; }
        .footer-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
        .footer-col h4 { font-weight: 500; margin-bottom: 16px; }
        .footer-col a { color: var(--text-muted); text-decoration: none; display: block; margin-bottom: 8px; }
        
        @media (max-width: 768px) { .container { padding: 0 24px; } .nav-links { gap: 1rem; } h1 { font-size: 2rem; } .modal-header h2 { font-size: 1.4rem; } .modal-content { padding: 24px; } }
        
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; z-index: 1100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    </style>
</head>
<body>

<div id="toast" class="toast-msg"></div>

<header>
    <div class="container header-flex">
        <a href="index.html" class="logo">AROMA<span>LAB</span></a>
        <ul class="nav-links">
            <li><a href="services.html" class="active">Услуги</a></li>
            <li><a href="catalog.html">Ароматы</a></li>
            <li><a href="masterclass.html">Мастер-классы</a></li>
            <li><a href="contacts.html">Контакты</a></li>
        </ul>
    </div>
</header>

<main>
    <section class="page-title">
        <div class="container">
            <div class="section-subtitle">Что мы предлагаем</div>
            <h1>Наши услуги</h1>
        </div>
    </section>

    <div class="container">
        <div class="services-grid" id="servicesGrid"></div>
    </div>
</main>

<footer>
    <div class="container footer-grid">
        <div class="footer-col"><h4>Aroma Lab</h4><p>Парфюмерная лаборатория с 2018 года.</p></div>
        <div class="footer-col"><h4>Разделы</h4><a href="services.html">Услуги</a><a href="catalog.html">Ароматы</a><a href="masterclass.html">Мастер-классы</a><a href="contacts.html">Контакты</a></div>
        <div class="footer-col"><h4>Контакты</h4><p>+7 (495) 123-45-67</p><p>hello@aroma-lab.ru</p></div>
    </div>
</footer>

<script>

        },
        {
            id: 3,
            icon: "fas fa-chalkboard-user",
            title: "Мастер-классы",
            shortDesc: "Индивидуальные и групповые занятия по парфюмерному искусству.",
            fullDesc: "Погрузитесь в мир парфюмерии под руководством опытного мастера. Вы узнаете теорию создания ароматов, научитесь различать ноты и создадите свой первый авторский парфюм, который заберёте с собой.",

            fullDesc: "Не можете найти свой идеальный аромат? Наши парфюмеры помогут создать ольфакторный портрет и подберут композицию, которая идеально подчеркнёт вашу индивидуальность, характер и стиль жизни.",

            features: [
                "Выезд в офис или на площадку",
                "Группы до 30 человек",
                "Создание брендированного аромата",
                "Командообразующие активности",

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 3000);
    }

    function openModal(service) {
        const modalHTML = `
            <div class="modal-overlay" id="serviceModal">
                <div class="modal-container">
                    <div class="modal-header">
                        <h2>${service.title}</h2>
                        <button class="modal-close" onclick="closeModal()">✕</button>
                    </div>
                    <div class="modal-content">
                        <div class="modal-icon"><i class="${service.icon}"></i></div>
                        <p class="modal-description">${service.fullDesc}</p>
                        <div class="modal-features">
                            <h4>Что входит:</h4>
                            <ul>
                                ${service.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="modal-price">${service.price}</div>
                        <div style="color: var(--text-muted); margin-bottom: 16px;">
                            <i class="fas fa-clock"></i> Длительность: ${service.duration}
                        </div>
                        <div class="modal-actions">
                            <button class="btn" onclick="closeModalAndContact('${service.title}')">Записаться на услугу</button>
                            <button class="btn btn-outline" onclick="closeModal()">Закрыть</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        const modal = document.getElementById('serviceModal');
        setTimeout(() => modal.classList.add('active'), 10);
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal) {
                closeModal();
            }
        });
    }
    
    function closeModal() {
        const modal = document.getElementById('serviceModal');
        if (modal) {
            modal.classList.remove('active');
            setTimeout(() => modal.remove(), 300);
        }
    }
    
    function closeModalAndContact(serviceName) {
        closeModal();
        setTimeout(() => {
            window.location.href = `contacts.html?service=${encodeURIComponent(serviceName)}`;
        }, 300);
    }
    
    function renderServices() {
        const grid = document.getElementById('servicesGrid');
        grid.innerHTML = servicesData.map(service => `
            <div class="service-card" onclick="openModal(${JSON.stringify(service).replace(/"/g, '&quot;')})">
                <div class="service-icon"><i class="${service.icon}"></i></div>
                <h3>${service.title}</h3>
                <p>${service.shortDesc}</p>
            </div>
        `).join('');
    }
    
    renderServices();
    
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.closeModalAndContact = closeModalAndContact;
</script>
</body>
</html>
